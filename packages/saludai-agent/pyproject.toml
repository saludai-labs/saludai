[project]
name = "saludai-agent"
version = "0.1.0"
description = "Self-reasoning FHIR agent loop with tools"
license = "Apache-2.0"
requires-python = ">=3.12"
authors = [{ name = "SaludAI Labs" }]
keywords = ["fhir", "health", "ai", "agent", "llm"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Healthcare Industry",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering :: Medical Science Apps.",
    "Typing :: Typed",
]
dependencies = [
    "saludai-core",
    "anthropic>=0.49",
    "openai>=1.68",
    "langfuse>=2",
    "structlog>=24",
    "pydantic-settings>=2",
]

[project.urls]
Homepage = "https://github.com/saludai-labs/saludai"
Repository = "https://github.com/saludai-labs/saludai"
Issues = "https://github.com/saludai-labs/saludai/issues"

[tool.uv.sources]
saludai-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/saludai_agent"]
