[project]
name = "saludai-agent"
version = "0.1.0"
description = "Self-reasoning FHIR agent loop with tools"
license = "Apache-2.0"
requires-python = ">=3.12"
authors = [{ name = "SaludAI Labs" }]
dependencies = [
    "saludai-core",
    "anthropic>=0.49",
    "openai>=1.68",
    "langfuse>=2",
    "structlog>=24",
    "pydantic-settings>=2",
]

[tool.uv.sources]
saludai-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/saludai_agent"]
