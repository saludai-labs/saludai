[project]
name = "saludai-mcp"
version = "0.1.0"
description = "MCP server for SaludAI — connect to Claude Desktop and other agents"
license = "Apache-2.0"
requires-python = ">=3.12"
authors = [{ name = "SaludAI Labs" }]
keywords = ["fhir", "health", "mcp", "claude", "ai", "agent"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Healthcare Industry",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering :: Medical Science Apps.",
    "Typing :: Typed",
]
dependencies = [
    "saludai-core",
    "saludai-agent",
    "mcp>=1",
]

[project.urls]
Homepage = "https://github.com/saludai-labs/saludai"
Repository = "https://github.com/saludai-labs/saludai"
Issues = "https://github.com/saludai-labs/saludai/issues"

[project.scripts]
saludai-mcp = "saludai_mcp.server:main"

[tool.uv.sources]
saludai-core = { workspace = true }
saludai-agent = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/saludai_mcp"]
