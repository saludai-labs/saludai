[project]
name = "saludai-mcp"
version = "0.1.0"
description = "MCP server for SaludAI — connect to Claude Desktop and other agents"
license = "Apache-2.0"
requires-python = ">=3.12"
authors = [{ name = "SaludAI Labs" }]
dependencies = [
    "saludai-core",
    "saludai-agent",
    "mcp>=1",
]

[project.scripts]
saludai-mcp = "saludai_mcp.server:main"

[tool.uv.sources]
saludai-core = { workspace = true }
saludai-agent = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/saludai_mcp"]
