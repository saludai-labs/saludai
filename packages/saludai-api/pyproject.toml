[project]
name = "saludai-api"
version = "0.1.0"
description = "FastAPI REST interface for SaludAI"
license = "Apache-2.0"
requires-python = ">=3.12"
authors = [{ name = "SaludAI Labs" }]
dependencies = [
    "saludai-core",
    "saludai-agent",
    "fastapi>=0.115",
    "uvicorn>=0.34",
]

[tool.uv.sources]
saludai-core = { workspace = true }
saludai-agent = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/saludai_api"]
