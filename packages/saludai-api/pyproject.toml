[project]
name = "saludai-api"
version = "0.1.0"
description = "FastAPI REST interface for SaludAI"
license = "Apache-2.0"
requires-python = ">=3.12"
authors = [{ name = "SaludAI Labs" }]
keywords = ["fhir", "health", "api", "fastapi"]
classifiers = [
    "Development Status :: 2 - Pre-Alpha",
    "Intended Audience :: Healthcare Industry",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering :: Medical Science Apps.",
    "Typing :: Typed",
]
dependencies = [
    "saludai-core",
    "saludai-agent",
    "fastapi>=0.115",
    "uvicorn>=0.34",
]

[project.urls]
Homepage = "https://github.com/saludai-labs/saludai"
Repository = "https://github.com/saludai-labs/saludai"
Issues = "https://github.com/saludai-labs/saludai/issues"

[tool.uv.sources]
saludai-core = { workspace = true }
saludai-agent = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/saludai_api"]
